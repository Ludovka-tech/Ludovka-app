<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ľudovka</title>
<link rel="stylesheet" href="styles.css">

<!-- PWA: installable "Add to Home Screen" support -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3e5f82">
<link rel="icon" href="icons/icon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ľudovka">
</head>
<body>

<header class="topbar">
  <div class="topbar-title" id="topbarTitle">Ľudovka</div>
  <button class="icon-btn" id="backBtn" hidden aria-label="Späť">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 19l-7-7 7-7"/></svg>
  </button>
</header>

<div id="songReaderBg" class="song-reader-bg"></div>
<main id="view"></main>

<button class="fab" id="newPlaylistFab" hidden aria-label="Nový playlist">+</button>

<nav class="bottomnav">
  <button class="navbtn active" data-tab="songs">
    <svg class="navicon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
    <span>Piesne</span>
  </button>
  <button class="navbtn" data-tab="playlists">
    <svg class="navicon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h6l2 2.5h10a1 1 0 0 1 1 1V18a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1Z"/></svg>
    <span>Playlisty</span>
  </button>
  <button class="navbtn" data-tab="admin">
    <svg class="navicon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    <span>Spravovať</span>
  </button>
</nav>

<div id="toast" class="toast" hidden></div>

<script src="xlsx.min.js"></script>
<script src="seed-songs.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(err){
      console.warn('Service worker registration failed:', err);
    });
  });
}
</script>
</body>
</html>
