name: Build Ľudovka APK

# Builds a debug-signed, installable .apk (no Play Store / dev account involved)
# and commits it to the "dist" branch every time you push, or whenever you
# trigger it manually from the Actions tab. (Private repos can't serve Release
# assets to plain unauthenticated downloads, so we use a plain git-tracked
# branch instead — works with any git client, no API calls needed.)
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install required Android SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Collect APK
        run: |
          mkdir -p out
          cp android/app/build/outputs/apk/debug/app-debug.apk out/Ludovka.apk

      - name: Publish APK to dist branch
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          cp out/Ludovka.apk /tmp/Ludovka.apk
          git fetch origin dist:dist || true
          if git show-ref --verify --quiet refs/heads/dist; then
            git checkout dist
          else
            git checkout --orphan dist
            git rm -rf . > /dev/null 2>&1 || true
          fi
          cp /tmp/Ludovka.apk ./Ludovka.apk
          printf "Built from commit %s (run #%s) on %s\n" "${{ github.sha }}" "${{ github.run_number }}" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > BUILD_INFO.txt
          git add Ludovka.apk BUILD_INFO.txt
          git commit -m "APK build #${{ github.run_number }}" --allow-empty
          git push origin dist --force
